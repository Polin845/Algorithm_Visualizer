<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graph Algorithm Visualizer</title>
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../style for graph.css" />
</head>
<body>
   <header class="header">
    <h1>Algorithm Visualizer</h1>
    <div class="nav-container"></div>
  </header>

  <main class="container graph-layout">
     <section class="controls" aria-label="Controls">
        <div class="controls-row controls-row-playback">
          <button id="prevBtn" class="btn icon-btn" enabled title="Step Backward">
            <svg viewBox="0 0 24 24">
              <polygon points="19,4 9,12 19,20"></polygon>
              <rect x="5" y="4" width="3" height="16"></rect>
            </svg>
          </button>
          <button id="playPauseBtn" class="btn icon-btn" title="Resume">
            <svg id="playPauseIcon" viewBox="0 0 24 24">
              <polygon points="6,4 20,12 6,20"></polygon>
            </svg>
          </button>
          <button id="nextBtn" class="btn icon-btn" enabled title="Step Forward">
            <svg viewBox="0 0 24 24">
              <polygon points="5,4 15,12 5,20"></polygon>
              <rect x="16" y="4" width="3" height="16"></rect>
            </svg>
          </button>
          <button id="resetBtn" class="btn icon-btn" disabled title="Reset">
            <svg viewBox="0 0 24 24">
              <path d="M12 5V1L7 6l5 5V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z"></path>
            </svg>
          </button>
          <label for="speed" class="label controls-speed-label"> Speed:
          <span id="speedLabel" class="speed-label-text">250 ms</span>
          </label>
          <input id="speed" type="range" min="1" max="5" step="1" value="3" class="controls-speed-slider" />        </div>
        <!-- array generation row: generate button + custom input -->
        <div class="controls-row controls-row-generate">
          <button id="generateGraphBtn" class="btn">Generate Graph</button>
          <input id="customArray" type="text" placeholder="e.g. 3 1 4 1 5" class="input-text" />
        </div>
      </section>
    <section class="panel panel-viz">

      <div class="panel-header">
        <h2>Graph visualization</h2>
      </div>

      <div class="legend">
    <div class="legend-item">
      <span class="swatch swatch-active"></span>
      active node
    </div>

    <div class="legend-item">
      <span class="swatch swatch-place"></span>
      visited node
    </div>
    </div>

      <div class="viz-area">
        <svg
          id="graph"
          class="viz-svg"
          viewBox="0 0 600 400"
        ></svg>
      </div>
    </section>

    <!--панель состояния-->
    <section class="panel panel-state">

      <div class="panel-header">
        <h2>Algorithm state</h2>
      </div>

      <div class="state-content">

        <div class="state-block">
          <h3>Current vertex</h3>
          <div id="currentVertex">—</div>
        </div>

        <div class="state-block">
          <h3>Distances</h3>
          <div id="distances"></div>
        </div>

        <div class="state-block">
          <h3>Priority queue</h3>
          <div id="queue"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="../js/core/navigation.js"></script>
  <script src="../js/graph_deikstra/structures.js"></script>
  <script src="../js/graph_deikstra/min_heap.js"></script>
  <script src="../js/graph_deikstra/renderer.js"></script>
  <script src="../js/graph_deikstra/stepPlayer.js"></script>
  <script src="../js/graph_deikstra/the_deijkstra_itself.js"></script>

</body>
</html>
