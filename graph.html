<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graph Algorithm Visualizer</title>
  <link rel="stylesheet" href="style for graph.css" />
</head>
<body>
  <header class="header">
    <h1>Algorithm Visualizer</h1>
    <nav class="nav">
      <a href="graph.html" class="nav-link nav-link--active">Graph Traversals</a>
      <a href="counting.html" class="nav-link">Counting Sort</a>
    </nav>
  </header>

  <main class="main">
    <section class="controls">
      <div class="controls-row">
        <button id="generateGraphBtn">Generate Random Graph</button>
        <button id="nextBtn">Next</button>
        <button id="prevBtn">Prev</button>
        <div class="slider-group">
          <label for="graphSpeedRange">Speed:</label>
          <input
            type="range"
            id="graphSpeedRange"
            min="50"
            max="1000"
            value="250"
          />
          <span id="graphSpeedLabel">250 ms</span>
        </div>
      </div>
      <div class="info">
        Тут можно написать какое-нибудь инфо
      </div>
    </section>

    <section class="visualizer">
      <div id="graphContainer" class="graph-container"></div>
    </section>
  </main>

  <script src="js/graph_deikstra/structures.js"></script>
  <script src="js/graph_deikstra/min_heap.js"></script>
  <script src="js/graph_deikstra/renderer.js"></script>
  <script src="js/graph_deikstra/stepPlayer.js"></script>
  <script src="js/graph_deikstra/the_deijkstra_itself.js"></script>

</body>
</html>
